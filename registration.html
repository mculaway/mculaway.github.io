<html>

<body style="background-color:darkslategray;">
	<div class="contents">
	<div class="center">
	<h1>Registration form</h1>
	<form>First name: <input type="text" name="firstname" /></form>
	<form>Last name: <input type="text" name="firstname" /></form>
	<form>Nick name: <input type="text" name="firstname" /></form>
	<form>Email name: <input type="text" name="firstname" /></form>
	<form>Password: <input type="text" name="firstname" /></form>
	<label for="birthday">Date of Birth:</label>
	<input type="date" id="birthday" name="birthday"><br>
	
	Gender:
	<input type="radio" id="gender1" name="gender" value="Male">
  	<label for="gender">Male</label>
  	<input type="radio" id="gender1" name="gender" value="Female">
  	<label for="gender">Female</label>
	<form>Mobile: <input type="text" name="firstname" /></form><br>	
	Address:
	<textarea rows="10" cols="30"></textarea><br>
	<input type="submit" value="submit"> <input type="reset" value="reset">
	</div>
	</div>
